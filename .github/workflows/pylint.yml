name: Pylint

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.py'
      - '.github/workflows/pylint.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**/*.py'
      - '.github/workflows/pylint.yml'

jobs:
  pylint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -e .

      - name: Lint sherlock_project with Pylint
        run: |
          pylint sherlock_project \
            --disable=C0114,C0115,C0116 \
            --max-line-length=120 \
            --fail-under=6.0 \
            --output-format=colorized \
            || true

      - name: Lint investigate.py
        run: |
          pylint investigate.py \
            --disable=C0114,C0115,C0116 \
            --max-line-length=120 \
            --fail-under=5.0 \
            --output-format=colorized \
            || true

      - name: Lint summary (informational)
        run: |
          echo "=== Pylint Summary ==="
          echo "Ran pylint on sherlock_project/ and investigate.py"
          echo "Threshold: 6.0/10 for core, 5.0/10 for scripts"
          echo "Check the logs above for detailed findings."
