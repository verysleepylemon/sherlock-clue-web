<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>线索网 — Clue Web</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040810;font-family:'Segoe UI','Helvetica Neue',sans-serif;color:#c9d1d9;overflow:hidden;user-select:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1a2332;border-radius:2px}

/* ── Layout ── */
#app{position:fixed;inset:0;display:grid;
  grid-template:"hdr hdr" 52px "main side" 1fr / 1fr 0px;
  transition:grid-template-columns .25s ease}
#app.side-open{grid-template-columns:1fr 300px}

/* ── Header ── */
#hdr{grid-area:hdr;display:flex;align-items:center;gap:12px;padding:0 18px;
  background:#060c18cc;border-bottom:1px solid #0e1a2e;z-index:30;
  backdrop-filter:blur(14px)}
#logo{font-size:13px;font-weight:800;letter-spacing:2.5px;color:#4ecdc4;
  text-transform:uppercase;text-shadow:0 0 18px #4ecdc466}
.sep{width:1px;height:24px;background:#162033}
#t-name{font-size:16px;font-weight:700;color:#e8f0fe}
.chip{background:#0a1628;border:1px solid #162033;border-radius:16px;
  padding:3px 10px;font-size:11px;color:#5a7da0;white-space:nowrap}
.chip b{color:#4ecdc4;font-weight:700}
#search{margin-left:auto;background:#0a1628;border:1px solid #162033;border-radius:6px;
  color:#c9d1d9;font-size:12px;padding:5px 10px;width:170px;outline:none}
#search:focus{border-color:#4ecdc466}
#search::placeholder{color:#2a3f5a}
.hbtn{background:#0a1628;border:1px solid #162033;border-radius:6px;
  color:#5a7da0;font-size:11px;padding:5px 10px;cursor:pointer;white-space:nowrap;
  transition:.12s}
.hbtn:hover{color:#e8f0fe;border-color:#4ecdc466;background:#4ecdc411}
.hbtn.on{color:#4ecdc4;border-color:#4ecdc4;background:#4ecdc418}

/* ── Canvas ── */
#main{grid-area:main;position:relative;overflow:hidden;background:#040810}
#bgc,#fgc{position:absolute;inset:0;width:100%;height:100%}
#fgc{cursor:default}

/* ── Sidebar ── */
#side{grid-area:side;background:#060c18ee;border-left:1px solid #0e1a2e;
  overflow-y:auto;z-index:20;display:flex;flex-direction:column;
  backdrop-filter:blur(10px)}
#sp-head{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;
  border-bottom:1px solid #0e1a2e}
#sp-icon{font-size:18px}
#sp-title{font-size:13px;font-weight:700;color:#e8f0fe;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sp-close{background:none;border:none;color:#2a3f5a;font-size:14px;cursor:pointer}
#sp-close:hover{color:#c9d1d9}
#sp-body{flex:1;overflow-y:auto;padding:4px 0 12px}
.sp-sec{padding:8px 14px 4px;border-bottom:1px solid #0e1a2e}
.sp-hd{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#2a3f5a;margin-bottom:6px}
.sp-row{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;color:#5a7da0}
.sp-row b{color:#c9d1d9;font-weight:600}
.sp-url{font-size:10px;color:#4ecdc4;word-break:break-all;padding:2px 0;cursor:pointer}
.sp-url:hover{text-decoration:underline}
.sp-site{display:flex;align-items:center;padding:4px 14px;font-size:11px;
  color:#5a7da0;cursor:pointer;gap:6px;transition:.1s}
.sp-site:hover{background:#4ecdc408;color:#c9d1d9}
.sp-site .dot{width:6px;height:6px;border-radius:50%}
.sp-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;
  margin:2px 2px 2px 0;border:1px solid #162033;color:#5a7da0}
.bar-row{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:10px}
.bar-lbl{width:60px;text-align:right;flex-shrink:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:#0a1628;border-radius:2px;height:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.bar-n{width:20px;text-align:right;color:#2a3f5a;flex-shrink:0}
#sp-actions{padding:10px 14px;display:flex;gap:6px;border-top:1px solid #0e1a2e}
.sp-btn{flex:1;background:#0a1628;border:1px solid #162033;border-radius:5px;
  color:#5a7da0;font-size:11px;padding:6px 0;cursor:pointer;text-align:center;transition:.12s}
.sp-btn:hover{color:#c9d1d9;border-color:#4ecdc466}
.sp-btn.pri{color:#4ecdc4;border-color:#4ecdc466;background:#4ecdc418}

/* ── Tooltip ── */
#tip{position:fixed;z-index:50;background:#0a1628f0;border:1px solid #162033;
  border-radius:8px;padding:10px 14px;max-width:240px;font-size:11px;line-height:1.6;
  pointer-events:none;opacity:0;transition:opacity .12s;
  box-shadow:0 8px 32px #000000aa,0 0 20px #4ecdc410}
.tn{font-size:12px;font-weight:700;margin-bottom:2px}
.tc{font-size:9px;opacity:.6;margin-bottom:3px}
.tu{font-size:9px;color:#5a7da0;word-break:break-all}
.th{font-size:9px;color:#4ecdc4;margin-top:2px}

/* ── Toast ── */
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:#4ecdc418;border:1px solid #4ecdc466;color:#4ecdc4;
  font-size:12px;padding:6px 16px;border-radius:6px;z-index:60;
  opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}

/* ── Physics badge ── */
#physics-badge{position:fixed;bottom:12px;left:12px;z-index:40;
  background:#060c18cc;border:1px solid #162033;border-radius:8px;
  padding:6px 12px;font-size:9px;color:#2a3f5a;line-height:1.6;
  backdrop-filter:blur(6px)}
#physics-badge a{color:#4ecdc4;text-decoration:none}
#physics-badge a:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="app">

<div id="hdr">
  <div id="logo">线索网</div><div class="sep"></div>
  <div id="t-name"></div>
  <div class="chip">Platforms <b id="c-total">-</b></div>
  <div class="chip">Categories <b id="c-cats">-</b></div>
  <div class="chip">Variants <b id="c-vars">-</b></div>
  <input id="search" placeholder="Search platforms…" autocomplete="off">
  <button class="hbtn" onclick="exportURLs()">⬇ Export</button>
  <button class="hbtn on" id="btn-phys" onclick="togglePhysics()">◉ Physics</button>
  <button class="hbtn" onclick="resetView()">⊙ Fit</button>
</div>

<div id="main">
  <canvas id="bgc"></canvas>
  <canvas id="fgc"></canvas>
</div>

<div id="side">
  <div id="sp-head" style="display:none">
    <div id="sp-icon"></div><div id="sp-title"></div>
    <button id="sp-close" onclick="closeSide()">✕</button>
  </div>
  <div id="sp-body">
    <div style="padding:32px 16px;text-align:center;color:#162033;font-size:12px;line-height:1.8">
      Click any node<br>to see context<br><br>
      <span style="font-size:10px;color:#0e1a2e">— particle physics UI —</span>
    </div>
  </div>
  <div id="sp-actions" style="display:none">
    <button class="sp-btn pri" id="sp-open" onclick="spOpen()">↗ Open</button>
    <button class="sp-btn" id="sp-copy" onclick="spCopy()">⎘ Copy</button>
  </div>
</div>

<div id="tip"></div>
<div id="toast"></div>
<div id="physics-badge">
  <b style="color:#5a7da0">⚛ Particle Physics UI</b><br>
  Engine: Canvas 2D verlet · spring constraints · water drift<br>
  Inspired by <a href="https://github.com/matteobruni/tsparticles" target="_blank" rel="noopener noreferrer">tsParticles</a>
  + <a href="https://github.com/milcktoast/particulate-js" target="_blank" rel="noopener noreferrer">Particulate.js</a>
</div>

</div>
<script>
/*%%CLUE_DATA%%*/

// ════════════════════════════════════════════════════════════
//  PARTICLE PHYSICS ENGINE — Clue Web v3
//  Water-drift verlet simulation with distance-based connections,
//  spring constraints, and interactive force fields.
//  Inspired by tsParticles + Particulate.js patterns.
// ════════════════════════════════════════════════════════════

const NT={TARGET:'target',VAR:'var',CAT:'cat',SITE:'site'};

// ── Canvas setup ──
const bgC=document.getElementById('bgc'), fgC=document.getElementById('fgc');
const bgX=bgC.getContext('2d'), ctx=fgC.getContext('2d');
let DPR=devicePixelRatio||1;
let W=0,H=0;

// ── Physics config ──
const PHY={
  enabled:true,
  damping:0.985,
  drift:0.12,
  driftFreq:0.0004,
  mouseRadius:160,
  mouseForce:0.8,
  connectDist:180,
  breakDist:240,
  reconnectDist:140,
  springK:0.0003,
  buoyancy:0.015,
  maxVel:3,
};

// ── Camera ──
let camX=0,camY=0,camScale=1;
const MIN_S=0.08,MAX_S=4;

// ── State ──
let particles=[], connections=[], pMap={};
let hovered=null, selected=null;
let dragging=null, dragOff={x:0,y:0};
let panning=false, panStart=null, camStart=null;
let mouseWorld={x:0,y:0}, mouseScreen={x:0,y:0};
let mouseInCanvas=false;
let searchQ='';
let time=0;

// ── Favicon cache ──
const favCache={};
const favLoading=new Set();

function getFavicon(url){
  if(!url) return null;
  try{
    const u=new URL(url);
    const domain=u.hostname;
    if(favCache[domain]) return favCache[domain];
    if(favLoading.has(domain)) return null;
    favLoading.add(domain);
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=function(){favCache[domain]=img;favLoading.delete(domain);};
    img.onerror=function(){favLoading.delete(domain);};
    img.src='https://icons.duckduckgo.com/ip3/'+domain+'.ico';
    return null;
  }catch(e){return null;}
}

// ════════════════════════════════════════════════════════════
//  PARTICLE CREATION
// ════════════════════════════════════════════════════════════
function buildParticles(){
  particles=[]; connections=[]; pMap={};

  // Target (center)
  addP('#T',NT.TARGET,DATA.target,DATA.total+' found',0,0,36,'#4ecdc4','#4ecdc433',null,null,[]);

  // Variants
  var vars=DATA.variations;
  vars.forEach(function(v,i){
    var a=(i/vars.length)*Math.PI*2-Math.PI/2;
    var r=120+Math.random()*30;
    var cnt=DATA.var_counts[v]||0;
    addP('V:'+v,NT.VAR,v,''+cnt,Math.cos(a)*r,Math.sin(a)*r,16,'#58a6ff','#1f6feb33',null,null,[]);
  });

  // Categories
  var catKeys=Object.keys(DATA.categories).filter(function(k){return DATA.categories[k].length>0;})
    .sort(function(a,b){return DATA.categories[b].length-DATA.categories[a].length;});
  catKeys.forEach(function(cat,i){
    var a=(i/catKeys.length)*Math.PI*2-Math.PI/2;
    var r=250+Math.random()*40;
    var meta=DATA.cat_meta[cat]||{color:'#607d8b'};
    addP('C:'+cat,NT.CAT,cat,''+DATA.categories[cat].length,
      Math.cos(a)*r,Math.sin(a)*r,22,meta.color,meta.color+'33',null,cat,[]);
  });

  // Sites
  catKeys.forEach(function(cat){
    var sites=DATA.categories[cat];
    var meta=DATA.cat_meta[cat]||{color:'#607d8b'};
    var catP=pMap['C:'+cat];
    if(!catP) return;
    sites.forEach(function(site){
      var a=Math.random()*Math.PI*2;
      var r=60+Math.random()*120;
      addP('S:'+site.site,NT.SITE,site.site,'',
        catP.x+Math.cos(a)*r,catP.y+Math.sin(a)*r,
        10,meta.color,meta.color+'22',site.url,cat,site.sources||[]);
      getFavicon(site.url);
    });
  });

  rebuildConnections();
}

function addP(id,type,label,sub,x,y,r,color,glow,url,cat,sources){
  var p={id:id,type:type,label:label,sub:sub,x:x,y:y,px:x,py:y,vx:0,vy:0,
    r:r,color:color,glow:glow,url:url,cat:cat,sources:sources,
    pinned:type===NT.TARGET,
    mass:type===NT.TARGET?10:type===NT.CAT?4:type===NT.VAR?3:1};
  pMap[id]=p;
  particles.push(p);
  return p;
}

// ════════════════════════════════════════════════════════════
//  CONNECTION SYSTEM
// ════════════════════════════════════════════════════════════
function rebuildConnections(){
  connections=[];
  var con={};
  function addC(a,b,type){
    var key=a<b?a+'|'+b:b+'|'+a;
    if(con[key]) return;
    con[key]=true;
    connections.push({a:a,b:b,type:type,active:true,strength:1});
  }
  // Target → variants
  particles.forEach(function(p){if(p.type===NT.VAR) addC('#T',p.id,'primary');});
  // Target → categories
  particles.forEach(function(p){if(p.type===NT.CAT) addC('#T',p.id,'category');});
  // Category → sites
  particles.forEach(function(p){
    if(p.type===NT.SITE&&p.cat) addC('C:'+p.cat,p.id,'site');
  });
  // Variant → site
  particles.forEach(function(p){
    if(p.type===NT.SITE)(p.sources||[]).forEach(function(src){
      if(pMap['V:'+src]) addC('V:'+src,p.id,'variant');
    });
  });
}

// ════════════════════════════════════════════════════════════
//  PHYSICS STEP
// ════════════════════════════════════════════════════════════
function physicsStep(){
  if(!PHY.enabled) return;
  var t=time;

  // Per-particle forces
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    if(p.pinned||p===dragging) continue;

    // Water drift
    var driftX=Math.sin(t*PHY.driftFreq+p.y*0.005)*PHY.drift
              +Math.sin(t*PHY.driftFreq*1.7+p.x*0.003)*PHY.drift*0.5;
    var driftY=Math.cos(t*PHY.driftFreq*0.8+p.x*0.004)*PHY.drift*0.7
              -PHY.buoyancy;
    p.vx+=driftX;
    p.vy+=driftY;

    // Mouse repulsion
    if(mouseInCanvas){
      var dx=p.x-mouseWorld.x, dy=p.y-mouseWorld.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<PHY.mouseRadius&&dist>1){
        var force=PHY.mouseForce*(1-dist/PHY.mouseRadius)/p.mass;
        p.vx+=dx/dist*force;
        p.vy+=dy/dist*force;
      }
    }
  }

  // Spring forces from connections
  for(var ci=0;ci<connections.length;ci++){
    var c=connections[ci];
    if(!c.active) continue;
    var a=pMap[c.a],b=pMap[c.b];
    if(!a||!b) continue;
    var dx=b.x-a.x, dy=b.y-a.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<1) continue;

    var rest=c.type==='primary'?120:c.type==='category'?200:c.type==='site'?100:150;
    var stretch=dist-rest;
    var force=stretch*PHY.springK;

    var fx=dx/dist*force, fy=dy/dist*force;
    if(!a.pinned&&a!==dragging){a.vx+=fx/a.mass;a.vy+=fy/a.mass;}
    if(!b.pinned&&b!==dragging){b.vx-=fx/b.mass;b.vy-=fy/b.mass;}

    // Break if too far
    if(dist>PHY.breakDist){c.active=false;c.strength=0;}
  }

  // Reconnect broken connections
  for(var ci=0;ci<connections.length;ci++){
    var c=connections[ci];
    if(c.active) continue;
    var a=pMap[c.a],b=pMap[c.b];
    if(!a||!b) continue;
    var dx=b.x-a.x,dy=b.y-a.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<PHY.reconnectDist){c.active=true;c.strength=0.1;}
  }

  // Animate connection strength
  for(var ci=0;ci<connections.length;ci++){
    var c=connections[ci];
    if(c.active&&c.strength<1) c.strength=Math.min(1,c.strength+0.02);
    if(!c.active&&c.strength>0) c.strength=Math.max(0,c.strength-0.03);
  }

  // Integration + damping
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    if(p.pinned||p===dragging) continue;
    p.vx*=PHY.damping;
    p.vy*=PHY.damping;
    var speed=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(speed>PHY.maxVel){p.vx*=PHY.maxVel/speed;p.vy*=PHY.maxVel/speed;}
    p.x+=p.vx;
    p.y+=p.vy;
  }
}

// ════════════════════════════════════════════════════════════
//  WATER BACKGROUND
// ════════════════════════════════════════════════════════════
function drawWaterBG(){
  var w=W,h=H;
  bgX.clearRect(0,0,w,h);

  // Deep ocean gradient
  var g=bgX.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*.7);
  g.addColorStop(0,'#081420');
  g.addColorStop(.5,'#050d18');
  g.addColorStop(1,'#020508');
  bgX.fillStyle=g;
  bgX.fillRect(0,0,w,h);

  // Animated caustic light beams
  var t=time*0.0003;
  bgX.globalCompositeOperation='lighter';
  for(var i=0;i<6;i++){
    var cx=w*(0.2+0.6*Math.sin(t+i*1.1));
    var cy=h*(0.15+0.7*Math.cos(t*0.7+i*0.8));
    var r=150+80*Math.sin(t*1.3+i);
    var cg=bgX.createRadialGradient(cx,cy,0,cx,cy,r);
    cg.addColorStop(0,'rgba(78,205,196,'+(0.015+0.01*Math.sin(t*2+i))+')');
    cg.addColorStop(1,'transparent');
    bgX.fillStyle=cg;
    bgX.fillRect(0,0,w,h);
  }

  // Subtle underwater grid
  bgX.globalCompositeOperation='source-over';
  bgX.strokeStyle='rgba(78,205,196,0.025)';
  bgX.lineWidth=0.5;
  var gs=60;
  var ox=(camX*camScale)%gs, oy=(camY*camScale)%gs;
  for(var x=-gs+ox;x<w+gs;x+=gs){bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,h);bgX.stroke();}
  for(var y=-gs+oy;y<h+gs;y+=gs){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(w,y);bgX.stroke();}

  // Floating plankton particles
  bgX.globalCompositeOperation='lighter';
  for(var i=0;i<40;i++){
    var px=(w*((i*7919+Math.sin(t*0.5+i)*30)%w+w))%w;
    var py=(h*((i*6271+Math.cos(t*0.3+i*0.7)*20)%h+h))%h;
    var pr=1+Math.sin(t*2+i)*0.8;
    bgX.beginPath();bgX.arc(px,py,Math.max(0.5,pr),0,Math.PI*2);
    bgX.fillStyle='rgba(78,205,196,'+(0.1+0.08*Math.sin(t*3+i))+')';
    bgX.fill();
  }
  bgX.globalCompositeOperation='source-over';
}

// ════════════════════════════════════════════════════════════
//  COORDINATE TRANSFORMS
// ════════════════════════════════════════════════════════════
function s2w(sx,sy){return{x:(sx-W/2)/camScale-camX,y:(sy-H/2)/camScale-camY};}
function w2s(wx,wy){return{x:(wx+camX)*camScale+W/2,y:(wy+camY)*camScale+H/2};}

// ════════════════════════════════════════════════════════════
//  PARTICLE ALPHA (search / selection filter)
// ════════════════════════════════════════════════════════════
function pAlpha(p){
  if(searchQ){
    var hit=p.label.toLowerCase().indexOf(searchQ)>=0||(p.url||'').toLowerCase().indexOf(searchQ)>=0;
    if(!hit&&p.type===NT.SITE) return 0.06;
  }
  if(selected){
    if(p===selected) return 1;
    for(var i=0;i<connections.length;i++){
      var c=connections[i];
      if(c.active&&((c.a===selected.id&&c.b===p.id)||(c.b===selected.id&&c.a===p.id))) return 1;
    }
    return 0.15;
  }
  return 1;
}

// ════════════════════════════════════════════════════════════
//  DRAWING — CONNECTIONS
// ════════════════════════════════════════════════════════════
function drawConnection(c){
  var a=pMap[c.a],b=pMap[c.b];
  if(!a||!b) return;
  var al=c.strength;
  if(al<0.01) return;

  var na=pAlpha(a),nb=pAlpha(b);
  if(na<0.1||nb<0.1) return;

  var sa=w2s(a.x,a.y),sb=w2s(b.x,b.y);
  var dx=b.x-a.x,dy=b.y-a.y;
  var dist=Math.sqrt(dx*dx+dy*dy);

  // Thins as it stretches
  var stretchRatio=Math.min(1,dist/PHY.breakDist);
  var baseW=c.type==='primary'?2:c.type==='category'?1.5:0.8;
  var lw=baseW*(1-stretchRatio*0.7)*al;

  var color=c.type==='variant'?'#58a6ff':a.color;
  var opacity=al*Math.min(na,nb)*(1-stretchRatio*0.5);

  ctx.save();
  ctx.strokeStyle=hexA(color,opacity*0.7);
  ctx.lineWidth=lw;
  if(c.type==='variant') ctx.setLineDash([4,6]);
  ctx.beginPath();ctx.moveTo(sa.x,sa.y);ctx.lineTo(sb.x,sb.y);ctx.stroke();
  ctx.setLineDash([]);

  // Animated energy pulse when selected
  if(al>0.5&&selected&&(selected.id===c.a||selected.id===c.b)){
    var t=(time*0.001)%1;
    var px=sa.x+(sb.x-sa.x)*t, py=sa.y+(sb.y-sa.y)*t;
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle=hexA(color,0.9);
    ctx.shadowColor=color;ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════════════
//  DRAWING — PARTICLES
// ════════════════════════════════════════════════════════════
function drawParticle(p){
  var al=pAlpha(p);
  if(al<0.01) return;
  var s=w2s(p.x,p.y);
  var r=p.r*camScale;
  var isH=p===hovered,isSel=p===selected;
  var nr=r+(isH||isSel?3:0);

  ctx.save();ctx.globalAlpha=al;

  // Glow halo
  var glR=nr*(isH||isSel?4:2.5);
  var gr=ctx.createRadialGradient(s.x,s.y,nr*0.3,s.x,s.y,glR);
  gr.addColorStop(0,p.glow);gr.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(s.x,s.y,glR,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();

  // Ripple ring when highlighted
  if(isH||isSel){
    var ripR=nr+8+Math.sin(time*0.003)*5;
    ctx.beginPath();ctx.arc(s.x,s.y,ripR,0,Math.PI*2);
    ctx.strokeStyle=hexA(p.color,0.2+0.1*Math.sin(time*0.004));
    ctx.lineWidth=1;ctx.stroke();
  }

  ctx.shadowColor=p.color+(isH||isSel?'88':'33');
  ctx.shadowBlur=isH||isSel?18:8;

  // Shape
  if(p.type===NT.TARGET){
    hexPath(ctx,s.x,s.y,nr);
  }else if(p.type===NT.CAT){
    ctx.beginPath();
    ctx.moveTo(s.x,s.y-nr);ctx.lineTo(s.x+nr*.85,s.y);
    ctx.lineTo(s.x,s.y+nr);ctx.lineTo(s.x-nr*.85,s.y);ctx.closePath();
  }else{
    ctx.beginPath();ctx.arc(s.x,s.y,nr,0,Math.PI*2);
  }

  // Fill gradient
  var bg=ctx.createRadialGradient(s.x,s.y-nr*.3,nr*.05,s.x,s.y,nr);
  bg.addColorStop(0,darken(p.color,.75)+'e0');bg.addColorStop(1,darken(p.color,.4)+'cc');
  ctx.fillStyle=bg;ctx.fill();

  // Favicon image inside site nodes
  if(p.type===NT.SITE&&p.url&&nr>5){
    var fav=getFavicon(p.url);
    if(fav&&fav.complete&&fav.naturalWidth>0){
      var ir=nr*0.65;
      ctx.save();ctx.beginPath();ctx.arc(s.x,s.y,ir,0,Math.PI*2);ctx.clip();
      try{ctx.drawImage(fav,s.x-ir,s.y-ir,ir*2,ir*2);}catch(e){}
      ctx.restore();
    }
  }

  // Border
  ctx.strokeStyle=hexA(p.color,isSel?1:isH?.85:.5);
  ctx.lineWidth=isSel?2.5:isH?1.8:1;
  if(p.type===NT.TARGET) hexPath(ctx,s.x,s.y,nr);
  else if(p.type===NT.CAT){
    ctx.beginPath();ctx.moveTo(s.x,s.y-nr);ctx.lineTo(s.x+nr*.85,s.y);
    ctx.lineTo(s.x,s.y+nr);ctx.lineTo(s.x-nr*.85,s.y);ctx.closePath();
  }else{
    ctx.beginPath();ctx.arc(s.x,s.y,nr,0,Math.PI*2);
  }
  ctx.stroke();
  ctx.shadowBlur=0;

  // Labels
  if(al<0.35&&p.type===NT.SITE){ctx.restore();return;}
  ctx.textAlign='center';ctx.textBaseline='middle';
  var fs=Math.max(9,11*camScale);

  if(p.type===NT.TARGET){
    ctx.fillStyle=p.color;ctx.font='bold '+Math.round(fs+1)+'px "Segoe UI",sans-serif';
    ctx.fillText(trunc(p.label,16),s.x,s.y-3*camScale);
    ctx.fillStyle=p.color+'bb';ctx.font=Math.round(fs-2)+'px "Segoe UI",sans-serif';
    ctx.fillText(p.sub,s.x,s.y+8*camScale);
  }else if(p.type===NT.CAT){
    ctx.fillStyle=p.color;ctx.font='bold '+Math.round(fs-1)+'px "Segoe UI",sans-serif';
    ctx.fillText(trunc(p.label,10),s.x,s.y-2*camScale);
    ctx.fillStyle=p.color+'aa';ctx.font=Math.round(fs-3)+'px "Segoe UI",sans-serif';
    ctx.fillText(p.sub,s.x,s.y+6*camScale);
  }else if(p.type===NT.VAR){
    ctx.fillStyle='#58a6ffcc';ctx.font=Math.round(fs-2)+'px monospace';
    ctx.textBaseline='top';
    ctx.fillText(trunc(p.label,16),s.x,s.y+nr+3);
  }else if(p.type===NT.SITE&&(isH||isSel||camScale>.7)){
    ctx.fillStyle=isSel?p.color:p.color+'bb';
    ctx.font=(isSel?'bold ':'')+Math.round(fs-2)+'px "Segoe UI",sans-serif';
    ctx.textBaseline='top';
    ctx.fillText(trunc(p.label,16),s.x,s.y+nr+2);
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════════════
//  MAIN RENDER LOOP
// ════════════════════════════════════════════════════════════
function frame(ts){
  time=ts;
  W=fgC.offsetWidth;H=fgC.offsetHeight;

  // Resize
  if(bgC.width!==W*DPR||bgC.height!==H*DPR){
    bgC.width=W*DPR;bgC.height=H*DPR;
    fgC.width=W*DPR;fgC.height=H*DPR;
  }
  bgX.setTransform(DPR,0,0,DPR,0,0);
  ctx.setTransform(DPR,0,0,DPR,0,0);

  physicsStep();
  drawWaterBG();
  ctx.clearRect(0,0,W,H);

  // Draw connections
  for(var i=0;i<connections.length;i++){
    if(connections[i].type!=='variant') drawConnection(connections[i]);
  }
  for(var i=0;i<connections.length;i++){
    if(connections[i].type==='variant') drawConnection(connections[i]);
  }

  // Draw particles (sites, vars, cats, target — back to front)
  var order=[NT.SITE,NT.VAR,NT.CAT,NT.TARGET];
  for(var oi=0;oi<order.length;oi++){
    var otype=order[oi];
    for(var i=0;i<particles.length;i++){
      if(particles[i].type===otype) drawParticle(particles[i]);
    }
  }

  requestAnimationFrame(frame);
}

// ════════════════════════════════════════════════════════════
//  INTERACTION — Mouse events
// ════════════════════════════════════════════════════════════
function hitTest(sx,sy){
  var w=s2w(sx,sy);
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    if(pAlpha(p)<0.1) continue;
    var dx=w.x-p.x,dy=w.y-p.y;
    if(Math.sqrt(dx*dx+dy*dy)<=p.r+6/camScale) return p;
  }
  return null;
}

fgC.addEventListener('mousedown',function(e){
  var sx=e.offsetX,sy=e.offsetY;
  if(e.button===0){
    var h=hitTest(sx,sy);
    if(h){
      dragging=h;
      var w=s2w(sx,sy);
      dragOff={x:h.x-w.x,y:h.y-w.y};
      fgC.style.cursor='grabbing';
    }
  }
  if(e.button===2||e.button===1){
    panning=true;panStart={x:e.clientX,y:e.clientY};
    camStart={x:camX,y:camY};fgC.style.cursor='grabbing';e.preventDefault();
  }
});

fgC.addEventListener('mousemove',function(e){
  var sx=e.offsetX,sy=e.offsetY;
  mouseScreen={x:sx,y:sy};
  mouseWorld=s2w(sx,sy);
  mouseInCanvas=true;

  if(dragging){
    var w=s2w(sx,sy);
    dragging.x=w.x+dragOff.x;
    dragging.y=w.y+dragOff.y;
    dragging.vx=0;dragging.vy=0;
    return;
  }
  if(panning){
    camX=camStart.x+(e.clientX-panStart.x)/camScale;
    camY=camStart.y+(e.clientY-panStart.y)/camScale;
    return;
  }

  var h=hitTest(sx,sy);
  if(h!==hovered){
    hovered=h;
    fgC.style.cursor=h?'pointer':'default';
    if(h) showTip(h,e.clientX,e.clientY);
    else hideTip();
  }else if(h){
    moveTip(e.clientX,e.clientY);
  }
});

fgC.addEventListener('mouseup',function(e){
  if(dragging){
    dragging=null;fgC.style.cursor='default';
  }
  if(panning){panning=false;fgC.style.cursor='default';}
});

fgC.addEventListener('mouseleave',function(){mouseInCanvas=false;hideTip();});
fgC.addEventListener('contextmenu',function(e){e.preventDefault();});

fgC.addEventListener('wheel',function(e){
  e.preventDefault();
  var factor=e.deltaY<0?1.12:1/1.12;
  var ns=Math.max(MIN_S,Math.min(MAX_S,camScale*factor));
  var wx=mouseWorld.x,wy=mouseWorld.y;
  camScale=ns;
  var newS=w2s(wx,wy);
  camX+=(mouseScreen.x-newS.x)/camScale;
  camY+=(mouseScreen.y-newS.y)/camScale;
},{passive:false});

fgC.addEventListener('click',function(e){
  var h=hitTest(e.offsetX,e.offsetY);
  if(h){
    if(h.type===NT.SITE&&h.url&&selected===h){
      window.open(h.url,'_blank','noopener,noreferrer');
    }else{
      selectParticle(h);
    }
  }else{
    closeSide();
  }
});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeSide();
  if(e.key==='r'||e.key==='R') resetView();
});

document.getElementById('search').addEventListener('input',function(e){
  searchQ=e.target.value.toLowerCase().trim();
});

// ════════════════════════════════════════════════════════════
//  SIDEBAR — Context panel
// ════════════════════════════════════════════════════════════
function selectParticle(p){
  selected=p;
  document.getElementById('app').classList.add('side-open');
  var head=document.getElementById('sp-head');
  var body=document.getElementById('sp-body');
  var acts=document.getElementById('sp-actions');
  head.style.display='flex';
  acts.style.display=p.type===NT.SITE?'flex':'none';

  var icons={target:'🌊',var:'⇄',cat:'◈',site:'↗'};
  document.getElementById('sp-icon').textContent=icons[p.type]||'●';
  document.getElementById('sp-title').textContent=p.label;

  var h='';
  if(p.type===NT.TARGET){
    h+=sec('OVERVIEW',
      '<div class="sp-row"><span>Platforms found</span><b>'+DATA.total+'</b></div>'+
      '<div class="sp-row"><span>Categories</span><b>'+Object.keys(DATA.categories).filter(function(k){return DATA.categories[k].length;}).length+'</b></div>'+
      '<div class="sp-row"><span>Variants</span><b>'+DATA.variations.length+'</b></div>'+
      '<div class="sp-row"><span>Elapsed</span><b>'+DATA.elapsed+'s</b></div>');
    var cats=Object.keys(DATA.categories).filter(function(k){return DATA.categories[k].length;})
      .sort(function(a,b){return DATA.categories[b].length-DATA.categories[a].length;});
    var max=(DATA.categories[cats[0]]||[]).length||1;
    h+=sec('CATEGORIES',cats.map(function(c){
      var meta=DATA.cat_meta[c]||{color:'#607d8b'};
      var cnt=DATA.categories[c].length;
      return '<div class="bar-row">'+
'<div class="bar-lbl" style="color:'+meta.color+'">'+c+'</div>'+
'<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(cnt/max*100)+'%;background:'+meta.color+'"></div></div>'+
'<div class="bar-n">'+cnt+'</div></div>';
    }).join(''));

  }else if(p.type===NT.VAR){
    var cnt=DATA.var_counts[p.label]||0;
    h+=sec('VARIANT',
      '<div class="sp-row"><span>Username</span><b style="font-family:monospace">'+esc(p.label)+'</b></div>'+
      '<div class="sp-row"><span>Found</span><b>'+cnt+'</b></div>');
    var found=[];
    Object.keys(DATA.categories).forEach(function(cat){
      DATA.categories[cat].filter(function(s){return(s.sources||[]).indexOf(p.label)>=0;})
        .forEach(function(s){found.push({site:s.site,url:s.url,cat:cat});});
    });
    var byCat={};found.forEach(function(s){(byCat[s.cat]=byCat[s.cat]||[]).push(s);});
    Object.keys(byCat).forEach(function(cat){
      var meta=DATA.cat_meta[cat]||{color:'#607d8b'};
      h+='<div class="sp-sec"><div class="sp-hd">'+esc(cat)+' ('+byCat[cat].length+')</div>';
      byCat[cat].forEach(function(s){h+='<div class="sp-site" onclick="window.open(\''+esc(s.url)+'\',\'_blank\',\'noopener,noreferrer\')">'+
'<div class="dot" style="background:'+meta.color+'"></div>'+esc(s.site)+'</div>';});
      h+='</div>';
    });

  }else if(p.type===NT.CAT){
    var sites=DATA.categories[p.cat]||[];
    h+=sec('CATEGORY',
      '<div class="sp-row"><span>Platforms</span><b>'+sites.length+'</b></div>'+
      '<div class="sp-row"><span>Variants matched</span><b>'+
        DATA.variations.filter(function(v){return sites.some(function(s){return(s.sources||[]).indexOf(v)>=0;});}).length+'</b></div>');
    h+=sec('SITES ('+sites.length+')',sites.map(function(s){
      var meta=DATA.cat_meta[p.cat]||{color:'#607d8b'};
      return '<div class="sp-site" onclick="window.open(\''+esc(s.url)+'\',\'_blank\',\'noopener,noreferrer\')">'+
'<div class="dot" style="background:'+meta.color+'"></div>'+esc(s.site)+'</div>';
    }).join(''));

  }else if(p.type===NT.SITE){
    h+=sec('PROFILE','<div class="sp-url" onclick="window.open(\''+esc(p.url)+'\',\'_blank\',\'noopener,noreferrer\')">↗ '+esc(p.url)+'</div>');
    var meta=DATA.cat_meta[p.cat]||{color:'#607d8b'};
    h+=sec('DETAILS',
      '<div class="sp-row"><span>Category</span><b style="color:'+meta.color+'">'+esc(p.cat)+'</b></div>'+
      '<div class="sp-row"><span>Found via</span><b>'+(p.sources||[]).map(function(s){return '<span class="sp-tag">'+esc(s)+'</span>';}).join(' ')+'</b></div>');
    document.getElementById('sp-open').dataset.url=p.url;
    document.getElementById('sp-copy').dataset.url=p.url;
  }
  body.innerHTML=h;
}

function closeSide(){
  selected=null;
  document.getElementById('app').classList.remove('side-open');
  document.getElementById('sp-head').style.display='none';
  document.getElementById('sp-body').innerHTML='<div style="padding:32px 16px;text-align:center;color:#162033;font-size:12px">Click any node</div>';
  document.getElementById('sp-actions').style.display='none';
}

function sec(t,c){return '<div class="sp-sec"><div class="sp-hd">'+t+'</div>'+c+'</div>';}

function spOpen(){
  var u=document.getElementById('sp-open').dataset.url;
  if(u) window.open(u,'_blank','noopener,noreferrer');
}
function spCopy(){
  var u=document.getElementById('sp-copy').dataset.url;
  if(u){navigator.clipboard.writeText(u);toast('Copied!');}
}

// ════════════════════════════════════════════════════════════
//  TOOLTIP
// ════════════════════════════════════════════════════════════
var tipEl=document.getElementById('tip');
function showTip(n,cx,cy){
  var mc=(n.cat&&DATA.cat_meta[n.cat])||{};
  var nc=mc.color||n.color;
  var html='';
  if(n.type===NT.TARGET)
    html='<div class="tn" style="color:'+nc+'">'+esc(n.label)+'</div><div class="tc">Investigation Target</div><div class="tu">'+DATA.total+' platforms · '+DATA.variations.length+' variants</div>';
  else if(n.type===NT.VAR)
    html='<div class="tn" style="color:#58a6ff">'+esc(n.label)+'</div><div class="tc">Username Variation</div><div class="tu">'+n.sub+' platforms</div>';
  else if(n.type===NT.CAT)
    html='<div class="tn" style="color:'+nc+'">'+esc(n.label)+'</div><div class="tc">Category · '+n.sub+' platforms</div>';
  else
    html='<div class="tn" style="color:'+nc+'">'+esc(n.label)+'</div><div class="tc">'+esc(n.cat)+'</div><div class="tu">'+esc(n.url)+'</div><div class="th">↗ Click to open · double-click to visit</div>';
  tipEl.innerHTML=html;tipEl.style.opacity='1';
  positionTip(cx,cy);
}
function moveTip(cx,cy){positionTip(cx,cy);}
function positionTip(cx,cy){
  var tx=cx+14,ty=cy-8;
  if(tx+250>window.innerWidth) tx=cx-260;
  if(ty+150>window.innerHeight) ty=window.innerHeight-160;
  if(ty<58) ty=58;
  tipEl.style.left=tx+'px';tipEl.style.top=ty+'px';
}
function hideTip(){tipEl.style.opacity='0';}

// ════════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════════
function hexA(hex,a){
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
  return 'rgba('+r+','+g+','+b+','+Math.max(0,Math.min(1,a))+')';
}
function darken(hex,f){
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=Math.round(parseInt(hex.substring(0,2),16)*f);
  var g=Math.round(parseInt(hex.substring(2,4),16)*f);
  var b=Math.round(parseInt(hex.substring(4,6),16)*f);
  return '#'+pad2(r)+pad2(g)+pad2(b);
}
function pad2(n){var s=Math.max(0,Math.min(255,n)).toString(16);return s.length<2?'0'+s:s;}
function hexPath(c,cx,cy,r){
  c.beginPath();
  for(var i=0;i<6;i++){var a=(i/6)*Math.PI*2-Math.PI/6;
    i===0?c.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):c.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
  c.closePath();
}
function trunc(s,n){return s.length>n?s.substring(0,n-1)+'…':s;}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function resetView(){
  if(!particles.length) return;
  var xs=[],ys=[];
  for(var i=0;i<particles.length;i++){xs.push(particles[i].x);ys.push(particles[i].y);}
  var pad=80;
  var bx=Math.min.apply(null,xs)-pad,bX=Math.max.apply(null,xs)+pad;
  var by=Math.min.apply(null,ys)-pad,bY=Math.max.apply(null,ys)+pad;
  var sx=W/(bX-bx),sy=H/(bY-by);
  camScale=Math.min(sx,sy,1.5)*.85;
  camX=-(bx+bX)/2;camY=-(by+bY)/2;
}

function togglePhysics(){
  PHY.enabled=!PHY.enabled;
  document.getElementById('btn-phys').classList.toggle('on',PHY.enabled);
}

function exportURLs(){
  var urls=[];
  Object.keys(DATA.categories).forEach(function(k){
    DATA.categories[k].forEach(function(s){urls.push(s.url);});
  });
  navigator.clipboard.writeText(urls.join('\n')).then(function(){toast('Copied '+urls.length+' URLs');});
}

function fillStats(){
  document.getElementById('t-name').textContent=DATA.target;
  document.getElementById('c-total').textContent=DATA.total;
  document.getElementById('c-cats').textContent=Object.keys(DATA.categories).filter(function(k){return DATA.categories[k].length;}).length;
  document.getElementById('c-vars').textContent=DATA.variations.length;
  document.title='线索网 · '+DATA.target+' — '+DATA.total+' found';
}

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
fillStats();
buildParticles();
resetView();
requestAnimationFrame(frame);
